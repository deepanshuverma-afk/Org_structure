<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR Team — Org Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --border:#e2e8f0;
  --border-strong:#c8d3e4;
  --text:#1a202c;
  --text-2:#4a5568;
  --text-3:#94a3b8;
  --air:#2563eb;
  --air-bg:#eff6ff;
  --air-border:#bfdbfe;
  --res:#c2590a;
  --res-bg:#fff7ed;
  --res-border:#fed7aa;
  --tea:#047857;
  --tea-bg:#ecfdf5;
  --tea-border:#a7f3d0;
  --nt:#6d28d9;
  --nt-bg:#f5f3ff;
  --nt-border:#ddd6fe;
  --hod-dark:#0f172a;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* ── HEADER ── */
nav{background:var(--hod-dark);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:200}
.logo{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px}
.logo em{color:#60a5fa;font-style:normal}
.pills{display:flex;gap:6px}
.pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:2px 9px;font-size:10px;color:rgba(255,255,255,.5)}
.pill b{color:#fff;font-weight:600}
.dot{width:6px;height:6px;border-radius:50%}

/* ── TOOLBAR ── */
.bar{background:#fff;border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;padding:0 16px;gap:8px;position:fixed;top:52px;left:0;right:0;z-index:199}
.si{position:relative}
.si input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px 5px 28px;border-radius:6px;font-size:12px;width:200px;outline:none;font-family:inherit}
.si input:focus{border-color:var(--air);background:#fff}
.si svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.drop{position:absolute;top:34px;left:0;width:260px;background:#fff;border:1px solid var(--border);border-radius:8px;z-index:400;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none}
.drop.on{display:block}
.dr{padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.dr:last-child{border-bottom:none}
.dr:hover{background:var(--bg)}
.dr strong{display:block;font-size:12px;font-weight:600}
.dr span{color:var(--text-3);font-size:10px}
.sep{width:1px;height:22px;background:var(--border)}
.btn{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-2);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--air-bg);border-color:var(--air-border);color:var(--air)}
.btn.a-all{background:var(--hod-dark);border-color:var(--hod-dark);color:#fff}
.btn.a-air{background:var(--air-bg);border-color:var(--air);color:var(--air);font-weight:700}
.btn.a-res{background:var(--res-bg);border-color:var(--res-border);color:var(--res);font-weight:700}
.btn.a-tea{background:var(--tea-bg);border-color:var(--tea-border);color:var(--tea);font-weight:700}
.btn.a-nt{background:var(--nt-bg);border-color:var(--nt-border);color:var(--nt);font-weight:700}
.ml{margin-left:auto}

/* ── CANVAS ── */
.cv{position:fixed;top:96px;left:0;right:0;bottom:0;overflow:auto;cursor:grab}
.cv.g{cursor:grabbing}
.cvi{padding:40px 48px 80px;display:inline-flex;flex-direction:column;gap:0;min-width:max-content}

/* ── TREE STRUCTURE ──
   Layout: HOD nodes across top, each expands downward
   HOD → [Cat → [Type → [Mgr → [Reportees]]]]
   Each HOD is a "branch" that sits side by side
*/
.forest{display:flex;flex-direction:row;align-items:flex-start;gap:0}

/* Each HOD branch */
.branch{display:flex;flex-direction:column;align-items:flex-start;padding:0 20px 0 0}

/* A row of children under a parent */
.children{display:flex;flex-direction:row;align-items:flex-start;gap:0}

/* A single node + its children below */
.unit{display:flex;flex-direction:column;align-items:center;padding:0 6px}

/* connector lines */
.vc{width:2px;background:var(--border-strong);flex-shrink:0}
.vc.h12{height:12px}
.vc.h16{height:16px}
.vc.h20{height:20px}

/* horizontal bar over children */
.hbar{height:2px;background:var(--border-strong)}

/* node sizing */
.node{border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:box-shadow .15s,transform .12s;position:relative}
.node:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-1px)}

/* L1: HOD */
.n-hod{width:176px;padding:12px 14px;border-color:transparent;background:var(--hod-dark);cursor:default}
.n-hod:hover{transform:none;box-shadow:none}
.n-hod .tag{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px}
.n-hod .name{font-size:13px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:3px}
.n-hod .sub{font-size:9px;color:rgba(255,255,255,.35);font-family:'Space Mono',monospace;margin-bottom:7px}
.n-hod .badges{display:flex;gap:5px}
.n-hod .badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.2px}
.badge-in{background:#10b981;color:#fff}
.badge-out{background:#f59e0b;color:#1a202c}
.n-hod .tot{font-size:9px;color:rgba(255,255,255,.3);margin-top:5px}

/* L2: Category */
.n-cat{width:152px;padding:9px 12px;cursor:pointer}
.n-cat.air{background:var(--air-bg);border-color:var(--air-border)}
.n-cat.results{background:var(--res-bg);border-color:var(--res-border)}
.n-cat .tag{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.n-cat.air .tag{color:var(--air)}
.n-cat.results .tag{color:var(--res)}
.n-cat .name{font-size:14px;font-weight:800;line-height:1}
.n-cat.air .name{color:var(--air)}
.n-cat.results .name{color:var(--res)}
.n-cat .cnt{font-size:9px;color:var(--text-3);margin-top:3px}
.n-cat .arrow{position:absolute;top:9px;right:10px;font-size:9px;color:var(--text-3)}

/* L3: Type */
.n-typ{width:140px;padding:8px 11px;cursor:pointer}
.n-typ.teacher{background:var(--tea-bg);border-color:var(--tea-border)}
.n-typ.nt{background:var(--nt-bg);border-color:var(--nt-border)}
.n-typ .tag{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.n-typ.teacher .tag{color:var(--tea)}
.n-typ.nt .tag{color:var(--nt)}
.n-typ .name{font-size:12px;font-weight:700}
.n-typ.teacher .name{color:var(--tea)}
.n-typ.nt .name{color:var(--nt)}
.n-typ .cnt{font-size:9px;color:var(--text-3);margin-top:2px}
.n-typ .arrow{position:absolute;top:8px;right:9px;font-size:9px;color:var(--text-3)}

/* L4: Manager */
.n-mgr{width:168px;padding:9px 12px;background:#1e293b;border-color:#1e293b;cursor:pointer}
.n-mgr.cross{background:#0c3461;border-left:3px solid #38bdf8}
.n-mgr:hover{box-shadow:0 4px 16px rgba(0,0,0,.2)}
.n-mgr .tag{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:3px}
.n-mgr .name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.n-mgr .dg{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.n-mgr .id{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,.25);margin-top:2px}
.n-mgr .xt{display:inline-block;font-size:7px;padding:1px 5px;border-radius:3px;margin-top:3px;background:#38bdf8;color:#0c1f35;font-weight:700}
.n-mgr .arrow{position:absolute;top:9px;right:9px;font-size:9px;color:rgba(255,255,255,.3)}
.n-mgr.hl{background:#1d4ed8!important;border-color:#1d4ed8!important}

/* Ghost manager */
.n-ghost{width:168px;padding:9px 12px;background:#2d3748;border-color:#f59e0b;border-left-width:3px;cursor:default}
.n-ghost:hover{transform:none}
.n-ghost .tag{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#f59e0b;margin-bottom:3px}
.n-ghost .name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.n-ghost .dg{font-size:9px;color:rgba(255,245,180,.5);margin-top:1px}
.n-ghost .id{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,.25);margin-top:2px}

/* L5: Reportee card group */
.rep-box{width:172px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.rep-hdr{padding:5px 10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);background:var(--bg);border-bottom:1px solid var(--border)}
.rep-row{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.rep-row:last-child{border-bottom:none}
.rep-row:hover{background:#f8fafc}
.rep-row.hl{background:#fef9c3}
.rep-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%}
.rep-ri{flex:1;min-width:0}
.rep-nm{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-dg{font-size:8px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-id{font-family:'Space Mono',monospace;font-size:7px;color:var(--text-3);flex-shrink:0}

/* count toggle badge on manager */
.cnt-badge{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:#475569;color:#fff;font-size:7px;font-weight:700;padding:1px 7px;border-radius:10px;cursor:pointer;z-index:2;font-family:'Space Mono',monospace;border:2px solid var(--bg);white-space:nowrap;transition:background .15s}
.cnt-badge:hover{background:#334155}
.cnt-badge.open{background:#2563eb}

/* Detail Panel */
.pnl{position:fixed;right:16px;top:68px;width:280px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;z-index:300;box-shadow:0 8px 28px rgba(0,0,0,.13);transform:translateX(300px);transition:transform .28s cubic-bezier(.16,1,.3,1)}
.pnl.on{transform:translateX(0)}
.phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pid{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-3);margin-bottom:2px}
.pname{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
.pcl{background:var(--bg);border:1px solid var(--border);color:var(--text-2);cursor:pointer;font-size:10px;border-radius:5px;padding:3px 9px;font-family:inherit}
.pcl:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.prow{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.prow:last-child{border-bottom:none}
.plbl{color:var(--text-3);min-width:68px;flex-shrink:0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
.pval{color:var(--text-2);flex:1;line-height:1.4}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
</style>
</head>

<nav>
  <div class="logo">Offline Central <em>ORG</em></div>
  <div class="pills">
    <div class="pill"><div class="dot" style="background:#60a5fa"></div>AIR <b id="c-air">-</b></div>
    <div class="pill"><div class="dot" style="background:#fb923c"></div>Results <b id="c-res">-</b></div>
    <div class="pill"><div class="dot" style="background:#34d399"></div>Teachers <b id="c-tea">-</b></div>
    <div class="pill"><div class="dot" style="background:#a78bfa"></div>Non-T <b id="c-nt">-</b></div>
    <div class="pill">Total <b id="c-tot">-</b></div>
  </div>

<div class="bar">

  <div class="sep"></div>
  <button class="btn" id="f-tea" onclick="sf('type','Teacher')">Teachers</button>
  <button class="btn" id="f-nt"  onclick="sf('type','Non Teacher')">Non-Teacher</button>
  <div class="sep"></div>
  <button class="btn" onclick="xAll(1)">Expand All</button>
  <button class="btn" onclick="xAll(0)">Collapse All</button>
</div>

<div class="cv" id="cv">
  <div class="cvi">
    <div class="forest" id="forest"></div>
  </div>
</div>

<div class="pnl" id="pnl">
  <div class="phead">
    <div><div class="pid" id="p-id"></div><div class="pname" id="p-nm"></div></div>
    <button class="pcl" onclick="closeP()">Close</button>
  </div>
  <div class="prow"><div class="plbl">Designation</div><div class="pval" id="p-dg"></div></div>
  <div class="prow"><div class="plbl">Department</div><div class="pval" id="p-dp"></div></div>
  <div class="prow"><div class="plbl">Category</div><div class="pval" id="p-ct"></div></div>
  <div class="prow"><div class="plbl">Type</div><div class="pval" id="p-ty"></div></div>
  <div class="prow"><div class="plbl">Location</div><div class="pval" id="p-lc"></div></div>
  <div class="prow"><div class="plbl">Joined</div><div class="pval" id="p-dj"></div></div>
</div>

  // Horizontal bar: rendered after DOM via rAF (need widths)
  requestAnimationFrame(function(){
    if(!childRow.parentNode) return;
    var units=Array.from(childRow.children);
    if(units.length<2) return;
    var first=units[0].getBoundingClientRect();
    var last=units[units.length-1].getBoundingClientRect();
    var rowRect=childRow.getBoundingClientRect();
    var x1=first.left+first.width/2-rowRect.left;
    var x2=last.left+last.width/2-rowRect.left;
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.style.cssText='position:absolute;top:-2px;left:0;width:100%;height:4px;overflow:visible;pointer-events:none';
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1','2');
    line.setAttribute('x2',x2);line.setAttribute('y2','2');
    line.setAttribute('stroke','#c8d3e4');line.setAttribute('stroke-width','2');
    svg.appendChild(line);
    childRow.appendChild(svg);
  });

  return u;
}

/* ── Build L5: reportee box ── */
function mkRepBox(mgr, reps, mgrKey){
  var open=S['r_'+mgrKey]!==false;

  // toggle badge on mgr node
  var badge=e('cnt-badge'+(open?' open':''));
  badge.textContent=(open?'▾ ':'▸ ')+reps.length;
  (function(k){badge.addEventListener('click',function(ev){ev.stopPropagation();S['r_'+k]=S['r_'+k]===false?true:false;build();});})(mgrKey);
  return {badge:badge, open:open};
}

/* ── Build L4 manager node ── */
function mkMgrNode(mgr, cat, typ, hodId){
  var key=mgr.id+'_'+hodId+'_'+cat+'_'+typ;
  var isGhost=!!mgr.__ghost;
  var isCross=!isGhost&&mgr.cross_type;
  var nd=e('node '+(isGhost?'n-ghost':'n-mgr'+(isCross?' cross':'')));
  nd.setAttribute('data-id',mgr.id);
  nd.innerHTML='<div class="tag">'+(isGhost?'Outside dataset':'L4 — Manager')+'</div>'+
    '<div class="name">'+mgr.name+'</div>'+
    '<div class="dg">'+mgr.designation+'</div>'+
    '<div class="id">'+mgr.id+'</div>'+
    (isCross?'<div class="xt">'+mgr.type+'</div>':'');
  if(!isGhost){(function(m){nd.addEventListener('click',function(){openP(m);});})(mgr);}

  var reps=mgr.reportees||[];
  if(reps.length===0) return mkUnit(nd,[]);

  var rb=mkRepBox(mgr, reps, key);
  nd.appendChild(rb.badge);

  if(!rb.open) return mkUnit(nd,[]);

  var repBox=e('rep-box');
  var rh=e('rep-hdr'); rh.textContent='Reportees ('+reps.length+')'; repBox.appendChild(rh);
  reps.forEach(function(rep){
    var ri=e('rep-row'); ri.setAttribute('data-id',rep.id);
    ri.innerHTML='<div class="rep-dot" style="background:'+dc(rep.category,rep.type)+'"></div>'+
      '<div class="rep-ri"><div class="rep-nm">'+rep.name+'</div><div class="rep-dg">'+rep.designation+'</div></div>'+
      '<div class="rep-id">'+rep.id+'</div>';
    (function(r){ri.addEventListener('click',function(){openP(r);});})(rep);
    repBox.appendChild(ri);
  });

  return mkUnit(nd,[mkUnit(repBox,[])]);
}

/* ── Build L3 type node ── */
function mkTypNode(typKey, g, cat, typ, hodId){
  var open=S[typKey]!==false;
  var tKey=typ==='Teacher'?'teacher':'nt';
  var cnt=g.managers.reduce(function(s,m){return s+m.reportees.length;},0)+
          g.ghost_managers.reduce(function(s,gm){return s+gm.reportees.length;},0);

  var nd=e('node n-typ '+tKey);
  nd.innerHTML='<div class="tag">L3 — Type</div>'+
    '<div class="name">'+(typ==='Teacher'?'Teacher':'Non-Teacher')+'</div>'+
    '<div class="cnt">'+cnt+' members</div>'+
    '<div class="arrow">'+(open?'▾':'▸')+'</div>';
  (function(k){nd.addEventListener('click',function(){S[k]=S[k]===false?true:false;build();});})(typKey);

  if(!open) return mkUnit(nd,[]);

  var allMgrs=g.managers.concat(
    g.ghost_managers.map(function(gm){return {__ghost:true,id:gm.id,name:gm.name,designation:'Not in dataset',reportees:gm.reportees,cross_type:false};})
  );
  var mgrUnits=allMgrs.map(function(mgr){return mkMgrNode(mgr,cat,typ,hodId);});
  return mkUnit(nd, mgrUnits);
}

/* ── Build L2 cat node ── */
function mkCatNode(catKey, hod, cat){
  var open=S[catKey]!==false;
  var types=hod.cats[cat];
  var cnt=0;
  Object.keys(types).forEach(function(tp){
    if(fTyp!=='all'&&fTyp!==tp)return;
    var g=types[tp];
    g.managers.forEach(function(m){cnt+=m.reportees.length;});
    g.ghost_managers.forEach(function(gm){cnt+=gm.reportees.length;});
  });
  if(cnt===0) return null;

  var nd=e('node n-cat '+cat.toLowerCase());
  nd.innerHTML='<div class="tag">L2 — Category</div>'+
    '<div class="name">'+cat+'</div>'+
    '<div class="cnt">'+cnt+' members</div>'+
    '<div class="arrow">'+(open?'▾':'▸')+'</div>';
  (function(k){nd.addEventListener('click',function(){S[k]=S[k]===false?true:false;build();});})(catKey);

  if(!open) return mkUnit(nd,[]);

  var typUnits=[];
  ['Teacher','Non Teacher'].forEach(function(typ){
    if(fTyp!=='all'&&fTyp!==typ)return;
    if(!types[typ]) return;
    var g=types[typ];
    var tc=g.managers.reduce(function(s,m){return s+m.reportees.length;},0)+
            g.ghost_managers.reduce(function(s,gm){return s+gm.reportees.length;},0);
    if(tc===0) return;
    var tk='t_'+hod.id+'_'+cat+'_'+typ;
    typUnits.push(mkTypNode(tk, g, cat, typ, hod.id));
  });
  if(!typUnits.length) return mkUnit(nd,[]);
  return mkUnit(nd, typUnits);
}

/* ── Build L1 HOD node ── */
function mkHodNode(hod){
  var cnt=countVisible(hod);
  if(cnt===0) return null;

  var nd=e('node n-hod');
  nd.innerHTML='<div class="tag">L1 — HOD</div>'+
    '<div class="name">'+hod.name+'</div>'+
    '<div class="sub">'+hod.id+'</div>'+
    '<div class="badges"><span class="badge '+(hod.in_dataset?'badge-in':'badge-out')+'">'+(hod.in_dataset?'In Team':'External')+'</span></div>'+
    '<div class="tot">'+cnt+' members</div>';

  var catUnits=[];
  ['AIR','Results'].forEach(function(cat){
    if(fCat!=='all'&&fCat!==cat)return;
    if(!hod.cats[cat])return;
    var ck='c_'+hod.id+'_'+cat;
    var cu=mkCatNode(ck,hod,cat);
    if(cu) catUnits.push(cu);
  });
  if(!catUnits.length) return null;
  return mkUnit(nd, catUnits);
}

/* ── MAIN BUILD ── */
function build(){
  var forest=document.getElementById('forest');
  forest.innerHTML='';

  DATA.hods.forEach(function(hod){
    var hu=mkHodNode(hod);
    if(!hu) return;
    var branch=e('branch');
    branch.appendChild(hu);
    forest.appendChild(branch);
  });
}

/* ── FILTERS ── */
function sf(axis,val){
  if(axis==='all'){fCat='all';fTyp='all';}
  else if(axis==='cat'){fCat=val;fTyp='all';}
  else{fTyp=val;fCat='all';}
  ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(id){document.getElementById(id).className='btn';});
  if(axis==='all') document.getElementById('f-all').className='btn a-all';
  if(axis==='cat'&&val==='AIR') document.getElementById('f-air').className='btn a-air';
  if(axis==='cat'&&val==='Results') document.getElementById('f-res').className='btn a-res';
  if(axis==='type'&&val==='Teacher') document.getElementById('f-tea').className='btn a-tea';
  if(axis==='type'&&val==='Non Teacher') document.getElementById('f-nt').className='btn a-nt';
  build();
}
function xAll(o){
  DATA.hods.forEach(function(hod){
    Object.keys(hod.cats).forEach(function(cat){
      S['c_'+hod.id+'_'+cat]=!o;
      Object.keys(hod.cats[cat]).forEach(function(typ){
        S['t_'+hod.id+'_'+cat+'_'+typ]=!o;
        var g=hod.cats[cat][typ];
        g.managers.forEach(function(m){S['r_'+m.id+'_'+hod.id+'_'+cat+'_'+typ]=!o;});
        g.ghost_managers.forEach(function(gm){S['r_'+gm.id+'_'+hod.id+'_'+cat+'_'+typ]=!o;});
      });
    });
  });
  build();
}

/* ── PANEL ── */
function openP(p){
  document.getElementById('p-id').textContent=p.id||'';
  document.getElementById('p-nm').textContent=p.name||'';
  document.getElementById('p-dg').textContent=p.designation||'';
  document.getElementById('p-dp').textContent=p.dept||'';
  document.getElementById('p-ct').textContent=p.category||'';
  document.getElementById('p-ty').textContent=p.type||'';
  document.getElementById('p-lc').textContent=p.loc||'';
  document.getElementById('p-dj').textContent=p.doj||'';
  document.getElementById('pnl').classList.add('on');
  document.querySelectorAll('.hl,.n-mgr.hl,.rep-row.hl').forEach(function(x){x.classList.remove('hl');});
  var t=document.querySelector('[data-id="'+p.id+'"]');
  if(t) t.classList.add('hl');
}
function closeP(){
  document.getElementById('pnl').classList.remove('on');
  document.querySelectorAll('.hl').forEach(function(x){x.classList.remove('hl');});
}

/* ── SEARCH ── */
var ALL=[],seen={},UNIQ=[];
DATA.hods.forEach(function(hod){
  Object.keys(hod.cats).forEach(function(cat){
    Object.keys(hod.cats[cat]).forEach(function(typ){
      var g=hod.cats[cat][typ];
      g.managers.forEach(function(m){ALL.push(m);m.reportees.forEach(function(r){ALL.push(r);});});
      g.ghost_managers.forEach(function(gm){gm.reportees.forEach(function(r){ALL.push(r);});});
    });
  });
});
ALL.forEach(function(p){if(!seen[p.id]){seen[p.id]=true;UNIQ.push(p);}});

var si=document.getElementById('srch'), dp=document.getElementById('drop');
si.addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  if(!q){dp.classList.remove('on');return;}
  var hits=UNIQ.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.id.toLowerCase().indexOf(q)>=0;}).slice(0,8);
  if(!hits.length){dp.classList.remove('on');return;}
  dp.innerHTML=hits.map(function(p){return '<div class="dr" data-id="'+p.id+'"><strong>'+p.name+'</strong><span>'+p.id+' · '+p.category+' / '+p.type+'</span></div>';}).join('');
  dp.classList.add('on');
  dp.querySelectorAll('.dr').forEach(function(el){
    el.addEventListener('click',function(){
      si.value='';dp.classList.remove('on');
      var id=this.getAttribute('data-id');
      var found=UNIQ.find(function(p){return p.id===id;});if(!found)return;
      DATA.hods.forEach(function(hod){
        Object.keys(hod.cats).forEach(function(cat){
          Object.keys(hod.cats[cat]).forEach(function(typ){
            var g=hod.cats[cat][typ];
            g.managers.forEach(function(m){
              if(m.reportees.some(function(r){return r.id===id;})){
                S['c_'+hod.id+'_'+cat]=true; // false = open, but we toggle with ===false
                S['c_'+hod.id+'_'+cat]=undefined;
                S['t_'+hod.id+'_'+cat+'_'+typ]=undefined;
                S['r_'+m.id+'_'+hod.id+'_'+cat+'_'+typ]=undefined;
              }
            });
            g.ghost_managers.forEach(function(gm){
              if(gm.reportees.some(function(r){return r.id===id;})){
                S['c_'+hod.id+'_'+cat]=undefined;
                S['t_'+hod.id+'_'+cat+'_'+typ]=undefined;
                S['r_'+gm.id+'_'+hod.id+'_'+cat+'_'+typ]=undefined;
              }
            });
          });
        });
      });
      fCat='all';fTyp='all';
      ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(i){document.getElementById(i).className='btn';});
      document.getElementById('f-all').className='btn a-all';
      build();
      setTimeout(function(){
        var t=document.querySelector('[data-id="'+id+'"]');
        if(t){t.scrollIntoView({behavior:'smooth',block:'center'});openP(found);}
      },120);
    });
  });
});
document.addEventListener('click',function(ev){if(!ev.target.closest('.si'))dp.classList.remove('on');});

/* ── PAN ── */
var cv=document.getElementById('cv');
var pan=false,px,py,sl,st;
cv.addEventListener('mousedown',function(ev){
  if(ev.target.closest('.node,.rep-row,.pnl,.bar,.btn,.si')) return;
  pan=true;px=ev.pageX;py=ev.pageY;sl=cv.scrollLeft;st=cv.scrollTop;cv.classList.add('g');
});
document.addEventListener('mousemove',function(ev){if(!pan)return;cv.scrollLeft=sl-(ev.pageX-px);cv.scrollTop=st-(ev.pageY-py);});
document.addEventListener('mouseup',function(){pan=false;cv.classList.remove('g');});

/* ── STATS ── */
document.getElementById('c-air').textContent=UNIQ.filter(function(p){return p.category==='AIR';}).length;
document.getElementById('c-res').textContent=UNIQ.filter(function(p){return p.category==='Results';}).length;
document.getElementById('c-tea').textContent=UNIQ.filter(function(p){return p.type==='Teacher';}).length;
document.getElementById('c-nt').textContent=UNIQ.filter(function(p){return p.type==='Non Teacher';}).length;
document.getElementById('c-tot').textContent=UNIQ.length;

build();
</script>
</body>
