<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR Team Org Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f9;
  --white:#ffffff;
  --border:#e1e8f0;
  --border2:#c8d5e6;
  --text:#1a2535;
  --text2:#4a5568;
  --text3:#8a9bb0;
  --air:#1d4ed8;
  --airlt:#eff6ff;
  --res:#b45309;
  --reslt:#fffbeb;
  --tea:#047857;
  --tealt:#ecfdf5;
  --nt:#6d28d9;
  --ntlt:#f5f3ff;
  --conn:#c8d5e6;
  --hod1:#0f172a;
  --hod2:#1e3a5f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* ── NAV ── */
header{height:52px;background:var(--hod1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.05)}
.logo{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px}
.logo em{color:#60a5fa;font-style:normal}
.stats{display:flex;gap:6px}
.sp{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2px 9px;font-size:10px;color:rgba(255,255,255,.45)}
.sp b{color:#fff;font-weight:600}
.sd{width:5px;height:5px;border-radius:50%}

/* ── TOOLBAR ── */
.tb{height:44px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;position:fixed;top:52px;left:0;right:0;z-index:99}
.sb{position:relative}
.sb input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px 5px 28px;border-radius:6px;font-size:12px;width:200px;outline:none;font-family:inherit;transition:border-color .2s}
.sb input:focus{border-color:var(--air);background:#fff}
.sb svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.dr{position:absolute;top:34px;left:0;width:260px;background:#fff;border:1px solid var(--border);border-radius:8px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none}
.dr.on{display:block}
.di{padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.di:last-child{border-bottom:none}
.di:hover{background:var(--bg)}
.di strong{display:block;font-size:12px;font-weight:600}
.di span{color:var(--text3);font-size:10px}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.btn{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:var(--airlt);border-color:#93c5fd;color:var(--air)}
.btn.aa{background:var(--hod1);border-color:var(--hod1);color:#fff}
.btn.ab{background:var(--airlt);border-color:#93c5fd;color:var(--air);font-weight:700}
.btn.ac{background:var(--reslt);border-color:#fcd34d;color:var(--res);font-weight:700}
.btn.ad{background:var(--tealt);border-color:#6ee7b7;color:var(--tea);font-weight:700}
.btn.ae{background:var(--ntlt);border-color:#c4b5fd;color:var(--nt);font-weight:700}
.mla{margin-left:auto}
.hint{font-size:10px;color:var(--text3);flex-shrink:0}

/* ── CANVAS ── */
.cv{position:fixed;top:96px;left:0;right:0;bottom:0;overflow:auto;cursor:grab}
.cv.pan{cursor:grabbing}
.wrap{padding:48px 56px 120px;display:inline-flex;flex-direction:row;gap:48px;align-items:flex-start;min-height:100%}

/* ── TREE NODES ── */
/* Each .tree is a vertical subtree: node on top, children below */
.tree{display:flex;flex-direction:column;align-items:center}
/* Row of sibling subtrees */
.kids{display:flex;flex-direction:row;align-items:flex-start;gap:0;position:relative;margin-top:0}
/* Vertical connector from parent bottom to horizontal bar */
.vdown{width:2px;background:var(--conn);flex-shrink:0}
/* Spacer per child column */
.kid{display:flex;flex-direction:column;align-items:center}
/* Vertical stub from hbar down to each child */
.vstub{width:2px;background:var(--conn)}

/* ── NODE CARDS ── */
.card{border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;position:relative;transition:box-shadow .15s,transform .13s;user-select:none}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.11);transform:translateY(-2px)}

/* HOD card */
.hod{width:178px;padding:13px 14px 11px;background:linear-gradient(145deg,var(--hod1) 0%,var(--hod2) 100%);border-color:transparent;cursor:default}
.hod:hover{transform:none;box-shadow:none}
.hod .lv{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px}
.card.hod .nm,.hod .nm{font-size:13px;font-weight:800;color:#fff!important;line-height:1.25;margin-bottom:2px}
.card.hod .lv,.hod .lv{color:rgba(255,255,255,.4)!important}
.card.hod .id,.hod .id{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.35)!important;margin-bottom:7px}
.hod .bgs{display:flex;gap:4px}
.hod .bg{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px}
.bg-in{background:#10b981;color:#fff}
.bg-out{background:#f59e0b;color:#1a2535}
.hod .tot{font-size:9px;color:rgba(255,255,255,.28);margin-top:6px}

/* Person card - color by category+type */
.card.air-t{border-top:3px solid var(--air)}
.card.air-n{border-top:3px solid #818cf8}
.card.res-t{border-top:3px solid var(--res)}
.card.res-n{border-top:3px solid #a855f7}
.card .lv{font-size:7px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.card .nm{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .dg{font-size:9px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .id{font-family:'Space Mono',monospace;font-size:7px;color:var(--text3);margin-top:3px}
.card.p{width:160px;padding:9px 11px 8px}

/* badges on card */
.card .cb{display:inline-flex;align-items:center;gap:3px;font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:4px}
.cb-air{background:var(--airlt);color:var(--air)}
.cb-res{background:var(--reslt);color:var(--res)}
.cb-tea{background:var(--tealt);color:var(--tea)}
.cb-nt{background:var(--ntlt);color:var(--nt)}

/* collapsed toggle badge */
.tog{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:#64748b;color:#fff;font-size:7px;font-weight:700;padding:1px 7px;border-radius:10px;cursor:pointer;z-index:3;font-family:'Space Mono',monospace;border:2px solid var(--bg);white-space:nowrap;transition:background .15s}
.tog:hover{background:#475569}
.tog.open{background:var(--air)}
.card.hl{outline:2.5px solid #f59e0b;outline-offset:2px}

/* ── DETAIL PANEL ── */
.pnl{position:fixed;right:16px;top:64px;width:278px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px;z-index:150;box-shadow:0 8px 28px rgba(0,0,0,.13);transform:translateX(300px);transition:transform .27s cubic-bezier(.16,1,.3,1)}
.pnl.on{transform:translateX(0)}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.pid{font-family:'Space Mono',monospace;font-size:8px;color:var(--text3);margin-bottom:2px}
.pnm{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.pcl{background:var(--bg);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;border-radius:5px;padding:3px 9px;font-family:inherit}
.pcl:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.pr{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.pr:last-child{border-bottom:none}
.pl{color:var(--text3);min-width:66px;flex-shrink:0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding-top:1px}
.pv{color:var(--text2);flex:1;line-height:1.4;font-size:11px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

dren": [{"id": "PW20866", "name": "Manpreet Singh", "designation": "Associate Manager", "category": "Results", "type": "Non Teacher", "dept": "Business Operations Results", "loc": "Gurukul – S.A.S Nagar – Chandigarh – PB", "doj": "2024-11-11", "hod_id": "PW1071", "hod_name": "Debabrata Das", "manager": "PW9732", "children": []}, {"id": "PW13394", "name": "Rahul Wadhwa", "designation": "Associate Manager", "category": "Results", "type": "Non Teacher", "dept": "Business Operations Results", "loc": "Gurukul – S.A.S Nagar – Chandigarh – PB", "doj": "2023-08-16", "hod_id": "PW1071", "hod_name": "Debabrata Das", "manager": "PW9732", "children": []}]}]}, {"id": "PW4210", "name": "Madhurima Baidya", "designation": "Manager", "category": "Results", "type": "Non Teacher", "dept": "Business Operations Results", "loc": "Corporate – KLJ Noida One – Noida – UP", "doj": "2022-08-08", "hod_id": "PW1071", "hod_name": "Debabrata Das", "manager": "PW1071", "children": [{"id": "PW6808", "name": "Ravi Kumar ", "designation": "Junior Associate", "category": "Results", "type": "Non Teacher", "dept": "Business Operations Results", "loc": "Corporate – Noida – (WFH) – UP", "doj": "2022-11-08", "hod_id": "PW1071", "hod_name": "Debabrata Das", "manager": "PW4210", "children": []}, {"id": "PW18291", "name": "Zaid Rehman", "designation": "Associate", "category": "Results", "type": "Non Teacher", "dept": "Business Operations Results", "loc": "Corporate – KLJ Noida One – Noida – UP", "doj": "2024-05-30", "hod_id": "PW1071", "hod_name": "Debabrata Das", "manager": "PW4210", "children": []}]}]}]};

var filt='all'; // 'all' | 'AIR' | 'Results' | 'Teacher' | 'NonTeacher'
var COL={}; // collapsed state: id -> true/false

/* ── filter helper ── */
function nodeVisible(n){
  if(!n.category) return true; // HOD node
  if(filt==='all') return true;
  if(filt==='AIR') return n.category==='AIR';
  if(filt==='Results') return n.category==='Results';
  if(filt==='Teacher') return n.type==='Teacher';
  if(filt==='NonTeacher') return n.type==='Non Teacher';
  return true;
}
function subtreeVisible(n){
  if(nodeVisible(n)) return true;
  return (n.children||[]).some(function(c){return subtreeVisible(c);});
}

/* ── category color class ── */
function colorClass(n){
  if(!n.category) return '';
  if(n.category==='AIR'&&n.type==='Teacher') return 'air-t';
  if(n.category==='AIR') return 'air-n';
  if(n.category==='Results'&&n.type==='Teacher') return 'res-t';
  return 'res-n';
}
function badgeColor(n){
  if(n.category==='AIR') return 'cb-air';
  return 'cb-res';
}
function typeColor(n){
  return n.type==='Teacher'?'cb-tea':'cb-nt';
}

/* ── count descendants ── */
function countDesc(n){
  var c=(n.children||[]).filter(function(ch){return subtreeVisible(ch);});
  return c.reduce(function(s,ch){return s+1+countDesc(ch);},0);
}

/* ── Build DOM tree recursively ── */
function mkTree(n, depth){
  if(!subtreeVisible(n)) return null;

  var isHod=n.is_hod||depth===0;
  var visKids=(n.children||[]).filter(function(c){return subtreeVisible(c);});
  var hasKids=visKids.length>0;
  var collapsed=COL[n.id]===true;
  var showKids=hasKids&&!collapsed;

  /* ── card ── */
  var card;
  if(isHod){
    card=mk('card hod');
    var tot=countDesc(n);
    card.innerHTML='<div class="lv">HOD</div>'+
      '<div class="nm">'+n.name+'</div>'+
      '<div class="id">'+n.id+'</div>'+
      '<div class="tot">'+tot+' members</div>';
    if(!n.external){ card.addEventListener('click',function(){openP(n);}); }
  } else {
    card=mk('card p '+colorClass(n));
    card.setAttribute('data-id',n.id);
    var lbl=depth===1?'Direct Report':'Reports To '+(n.manager||'');
    card.innerHTML='<div class="nm">'+n.name+'</div>'+
      '<div class="dg">'+n.designation+'</div>'+
      '<div class="id">'+n.id+'</div>'+
      '<span class="cb '+badgeColor(n)+'">'+n.category+'</span> '+
      '<span class="cb '+typeColor(n)+'">'+n.type+'</span>';
    card.addEventListener('click',function(ev){ev.stopPropagation();openP(n);});
  }

  /* toggle badge */
  if(hasKids){
    var tog=mk('tog'+(collapsed?'':' open'));
    tog.textContent=(collapsed?'▸ ':'▾ ')+visKids.length;
    (function(id){tog.addEventListener('click',function(ev){
      ev.stopPropagation();
      COL[id]=COL[id]===true?false:true;
      build();
    });})(n.id);
    card.appendChild(tog);
  }

  /* ── tree wrapper ── */
  var tree=mk('tree');
  tree.appendChild(card);

  if(!showKids) return tree;

  /* vertical line down from card */
  var vd=mk('vdown'); vd.style.height='20px'; tree.appendChild(vd);

  if(visKids.length===1){
    /* single child - just connect directly */
    var onlyChild=mkTree(visKids[0],depth+1);
    if(onlyChild) tree.appendChild(onlyChild);
    return tree;
  }

  /* multiple children - horizontal spread with hbar */
  var kidsRow=mk('kids');
  var builtKids=[];
  visKids.forEach(function(c){
    var ct=mkTree(c,depth+1);
    if(!ct) return;
    var kid=mk('kid');
    var vs=mk('vstub'); vs.style.height='20px';
    kid.appendChild(vs);
    kid.appendChild(ct);
    kidsRow.appendChild(kid);
    builtKids.push(kid);
  });
  tree.appendChild(kidsRow);

  /* draw hbar after layout */
  if(builtKids.length>1){
    requestAnimationFrame(function(){
      if(!kidsRow.parentNode) return;
      var rr=kidsRow.getBoundingClientRect();
      var f=builtKids[0].getBoundingClientRect();
      var l=builtKids[builtKids.length-1].getBoundingClientRect();
      var x1=f.left+f.width/2-rr.left;
      var x2=l.left+l.width/2-rr.left;
      var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:2px;overflow:visible;pointer-events:none;z-index:0';
      var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',x1); ln.setAttribute('y1','1');
      ln.setAttribute('x2',x2); ln.setAttribute('y2','1');
      ln.setAttribute('stroke','var(--conn)'); ln.setAttribute('stroke-width','2');
      svg.appendChild(ln);
      kidsRow.style.position='relative';
      kidsRow.insertBefore(svg,kidsRow.firstChild);
    });
  }

  return tree;
}

function mk(cls){var d=document.createElement('div');if(cls)d.className=cls;return d;}

/* ── MAIN BUILD ── */
function build(){
  var wrap=document.getElementById('wrap');
  wrap.innerHTML='';
  DATA.trees.forEach(function(t){
    var tr=mkTree(t,0);
    if(tr) wrap.appendChild(tr);
  });
}

/* ── FILTER ── */
function sf(f){
  filt=f;
  ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(id){document.getElementById(id).className='btn';});
  var map={all:['f-all','aa'],AIR:['f-air','ab'],Results:['f-res','ac'],Teacher:['f-tea','ad'],NonTeacher:['f-nt','ae']};
  if(map[f]){ document.getElementById(map[f][0]).className='btn '+map[f][1]; }
  build();
}

/* ── EXPAND/COLLAPSE ── */
function xAll(open){
  function walk(n){
    COL[n.id]=!open;
    (n.children||[]).forEach(walk);
  }
  DATA.trees.forEach(walk);
  build();
}

/* ── PANEL ── */
function openP(n){
  document.getElementById('p-id').textContent=n.id||'';
  document.getElementById('p-nm').textContent=n.name||'';
  document.getElementById('p-dg').textContent=n.designation||'';
  document.getElementById('p-dp').textContent=n.dept||'';
  document.getElementById('p-ct').textContent=n.category||'';
  document.getElementById('p-ty').textContent=n.type||'';
  document.getElementById('p-lc').textContent=n.loc||'';
  document.getElementById('p-dj').textContent=n.doj||'';
  document.getElementById('pnl').classList.add('on');
  document.querySelectorAll('.card.hl').forEach(function(x){x.classList.remove('hl');});
  var t=document.querySelector('[data-id="'+n.id+'"]');
  if(t) t.classList.add('hl');
}
function closeP(){
  document.getElementById('pnl').classList.remove('on');
  document.querySelectorAll('.card.hl').forEach(function(x){x.classList.remove('hl');});
}

/* ── SEARCH ── */
var FLAT=[];
function flatten(n){FLAT.push(n);(n.children||[]).forEach(flatten);}
DATA.trees.forEach(flatten);
var UNIQ=[]; var seen={};
FLAT.forEach(function(p){if(!seen[p.id]){seen[p.id]=true;UNIQ.push(p);}});

var si=document.getElementById('srch'), dr=document.getElementById('dr');
si.addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  if(!q){dr.classList.remove('on');return;}
  var hits=UNIQ.filter(function(p){return p.name&&(p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q));}).slice(0,8);
  if(!hits.length){dr.classList.remove('on');return;}
  dr.innerHTML=hits.map(function(p){return '<div class="di" data-id="'+p.id+'"><strong>'+p.name+'</strong><span>'+p.id+(p.designation?' · '+p.designation:'')+'</span></div>';}).join('');
  dr.classList.add('on');
  dr.querySelectorAll('.di').forEach(function(el){
    el.addEventListener('click',function(){
      si.value=''; dr.classList.remove('on');
      var id=this.getAttribute('data-id');
      var found=UNIQ.find(function(p){return p.id===id;});
      if(!found) return;
      // expand path to this node
      function expandPath(n){
        if(n.id===id){COL[n.id]=false;return true;}
        if((n.children||[]).some(function(c){return expandPath(c);})){COL[n.id]=false;return true;}
        return false;
      }
      DATA.trees.forEach(expandPath);
      filt='all';
      ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(i){document.getElementById(i).className='btn';});
      document.getElementById('f-all').className='btn aa';
      build();
      setTimeout(function(){
        var t=document.querySelector('[data-id="'+id+'"]');
        if(t){t.scrollIntoView({behavior:'smooth',block:'center'});openP(found);}
      },100);
    });
  });
});
document.addEventListener('click',function(ev){if(!ev.target.closest('.sb'))dr.classList.remove('on');});

/* ── PAN ── */
var cv=document.getElementById('cv');
var pan=false,px,py,sl,st;
cv.addEventListener('mousedown',function(ev){
  if(ev.target.closest('.card,.btn,.sb,.tog,.pnl')) return;
  pan=true;px=ev.pageX;py=ev.pageY;sl=cv.scrollLeft;st=cv.scrollTop;cv.classList.add('pan');
});
document.addEventListener('mousemove',function(ev){if(!pan)return;cv.scrollLeft=sl-(ev.pageX-px);cv.scrollTop=st-(ev.pageY-py);});
document.addEventListener('mouseup',function(){pan=false;cv.classList.remove('pan');});

/* ── STATS ── */
var rp=UNIQ.filter(function(p){return p.category;});
document.getElementById('c-air').textContent=rp.filter(function(p){return p.category==='AIR';}).length;
document.getElementById('c-res').textContent=rp.filter(function(p){return p.category==='Results';}).length;
document.getElementById('c-tea').textContent=rp.filter(function(p){return p.type==='Teacher';}).length;
document.getElementById('c-nt').textContent=rp.filter(function(p){return p.type==='Non Teacher';}).length;
document.getElementById('c-tot').textContent=rp.length;

build();
</script>
