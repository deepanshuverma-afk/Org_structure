<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR Team Org Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--white:#fff;--border:#dce3ef;--border2:#c4cedf;
  --air:#2563eb;--air-lt:#eff6ff;
  --results:#d97706;--results-lt:#fffbeb;
  --teacher:#059669;--teacher-lt:#ecfdf5;
  --nt:#7c3aed;--nt-lt:#f5f3ff;
  --text:#1e293b;--text-md:#475569;--text-sm:#94a3b8;
  --sh:0 2px 8px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.06);
  --sh-lg:0 8px 28px rgba(0,0,0,.13);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:#0f172a;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.logo{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:2px}
.logo em{color:#60a5fa;font-style:normal}
.hstats{display:flex;gap:8px}
.hpill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 9px;font-size:10px;color:rgba(255,255,255,.55)}
.hpill b{color:#fff}
.hdot{width:6px;height:6px;border-radius:50%}

.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sbox{position:relative}
.sbox input{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:6px 12px 6px 32px;border-radius:7px;font-size:12px;width:210px;outline:none;font-family:inherit;transition:border-color .2s}
.sbox input:focus{border-color:var(--air);background:#fff}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-sm);pointer-events:none}
.sdrop{position:absolute;top:36px;left:0;width:280px;background:#fff;border:1px solid var(--border);border-radius:8px;z-index:600;max-height:240px;overflow-y:auto;box-shadow:var(--sh-lg);display:none}
.sdrop.show{display:block}
.srow{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.srow:last-child{border-bottom:none}
.srow:hover{background:var(--bg)}
.srow b{font-size:13px;display:block}
.srow span{color:var(--text-sm);font-size:11px}
.tsep{width:1px;height:24px;background:var(--border)}
.tbtn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text-md);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtn:hover{border-color:var(--air);color:var(--air);background:var(--air-lt)}
.tbtn.on-all{background:#0f172a;border-color:#0f172a;color:#fff}
.tbtn.on-air{background:var(--air-lt);border-color:var(--air);color:var(--air);font-weight:700}
.tbtn.on-res{background:var(--results-lt);border-color:var(--results);color:var(--results);font-weight:700}
.tbtn.on-tea{background:var(--teacher-lt);border-color:var(--teacher);color:var(--teacher);font-weight:700}
.tbtn.on-nt{background:var(--nt-lt);border-color:var(--nt);color:var(--nt);font-weight:700}

/* CANVAS */
.cw{overflow:auto;height:calc(100vh - 106px);cursor:grab;user-select:none;background:var(--bg)}
.cw.panning{cursor:grabbing}
.canvas{padding:40px 48px 100px;display:inline-block;min-width:100%}

/* ── TREE LAYOUT ──
   Horizontal tree: each level flows left→right
   L1 HOD  →  L2 Cat  →  L3 Type  →  L4 Manager  →  L5 Reportee list
*/

/* Each "row" in the tree is a flex container for one HOD subtree */
.tree{display:flex;flex-direction:column;gap:48px}

/* One complete HOD tree */
.hod-tree{display:flex;flex-direction:row;align-items:flex-start;gap:0}

/* A column of items at a given level */
.level-col{display:flex;flex-direction:column;justify-content:flex-start;gap:0;position:relative}

/* Connector lines via SVG overlay */
.connector{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* Node cards */
.node{border-radius:10px;box-shadow:var(--sh);cursor:pointer;position:relative;background:var(--white);border:1.5px solid var(--border);transition:box-shadow .18s,transform .15s}
.node:hover{box-shadow:var(--sh-lg);transform:translateY(-1px)}

/* L1 HOD node */
.node-hod{width:168px;padding:12px 14px;background:linear-gradient(135deg,#0f172a,#1e3a5f);border:none;cursor:default}
.node-hod:hover{transform:none}
.node-hod .lv{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.node-hod .nm{font-size:13px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:2px}
.node-hod .id{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.35);margin-bottom:6px}
.node-hod .bgs{display:flex;gap:4px;flex-wrap:wrap}
.node-hod .bg{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px}
.bg-in{background:#10b981;color:#fff}
.bg-out{background:#f59e0b;color:#1e293b}
.node-hod .tot{font-size:9px;color:rgba(255,255,255,.4);margin-top:5px}

/* L2 Category node */
.node-cat{width:140px;padding:9px 12px;cursor:pointer}
.node-cat.air{background:var(--air);border-color:var(--air)}
.node-cat.results{background:var(--results);border-color:var(--results)}
.node-cat .lv{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:2px}
.node-cat .nm{font-size:13px;font-weight:800;color:#fff}
.node-cat .cnt{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px}

/* L3 Type node */
.node-typ{width:128px;padding:8px 12px;cursor:pointer}
.node-typ.teacher{background:var(--teacher);border-color:var(--teacher)}
.node-typ.nt{background:var(--nt);border-color:var(--nt)}
.node-typ .lv{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:2px}
.node-typ .nm{font-size:12px;font-weight:800;color:#fff}
.node-typ .cnt{font-size:9px;color:rgba(255,255,255,.6);margin-top:2px}

/* L4 Manager node */
.node-mgr{width:168px;padding:9px 12px;background:#1e293b;border-color:#1e293b;cursor:pointer}
.node-mgr.cross{background:#0c3461;border-color:#38bdf8;border-left-width:3px}
.node-mgr .lv{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:2px}
.node-mgr .nm{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-mgr .dg{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-mgr .id{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,.3);margin-top:2px}
.node-mgr .xtag{display:inline-block;font-size:7px;padding:1px 5px;border-radius:3px;margin-top:3px;background:#38bdf8;color:#0c1f35;font-weight:700}
.node-mgr.highlighted{background:#1d4ed8!important;border-color:#1d4ed8!important}

/* Ghost manager node */
.node-ghost{width:168px;padding:9px 12px;background:#334155;border-color:#f59e0b;border-left-width:3px;cursor:default}
.node-ghost .lv{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#f59e0b;margin-bottom:2px;opacity:.8}
.node-ghost .nm{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-ghost .dg{font-size:9px;color:#fbbf24;margin-top:1px}
.node-ghost .id{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,.3);margin-top:2px}

/* L5 Reportee list — vertical, compact */
.rep-group{width:172px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.rep-group-hdr{padding:5px 10px 4px;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-sm);background:#f8fafc;border-bottom:1px solid var(--border)}
.rep-row{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.rep-row:last-child{border-bottom:none}
.rep-row:hover{background:#f8fafc}
.rep-row.highlighted{background:#fef9c3}
.rep-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%}
.rep-info{flex:1;min-width:0}
.rep-name{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-dg{font-size:8px;color:var(--text-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-id{font-family:'Space Mono',monospace;font-size:7px;color:var(--text-sm);flex-shrink:0}
.rep-row[data-id].highlighted{background:#fef9c3}

/* Spacing wrappers for vertical grouping */
.node-wrap{padding:5px 0}   /* vertical padding per node */
.group-wrap{display:flex;flex-direction:column;gap:0}

/* Detail Panel */
.panel{position:fixed;right:20px;top:68px;width:286px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;z-index:700;box-shadow:var(--sh-lg);transform:translateX(320px);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.panel.open{transform:translateX(0)}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pid{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-sm);margin-bottom:2px}
.pnm{font-size:15px;font-weight:800;line-height:1.2}
.pcl{background:var(--bg);border:1px solid var(--border);color:var(--text-md);cursor:pointer;font-size:10px;border-radius:6px;padding:3px 9px;font-family:inherit}
.pcl:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.pr{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.pr:last-child{border-bottom:none}
.pl{color:var(--text-sm);text-transform:uppercase;letter-spacing:.4px;min-width:70px;flex-shrink:0;font-size:9px;font-weight:600;padding-top:1px}
.pv{color:var(--text-md);flex:1;line-height:1.4}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="logo">Offline Central <em>ORG</em> Chart</div>
  <div class="hstats">
    <div class="hpill"><div class="hdot" style="background:#60a5fa"></div>AIR: <b id="c-air">-</b></div>
    <div class="hpill"><div class="hdot" style="background:#fbbf24"></div>Results: <b id="c-res">-</b></div>
    <div class="hpill"><div class="hdot" style="background:#34d399"></div>Teachers: <b id="c-tea">-</b></div>
    <div class="hpill"><div class="hdot" style="background:#a78bfa"></div>Non-Teacher: <b id="c-nt">-</b></div>
    <div class="hpill">Total: <b id="c-tot">-</b></div>
  </div>
</header>
<div class="toolbar">
  <div class="sbox">
    <svg class="sico" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="srch" placeholder="Search name or ID...">
    <div class="sdrop" id="sdrop"></div>
  </div>
  <div class="tsep"></div>
  <button class="tbtn on-all" id="f-all" onclick="sf('all','all')">All</button>
  <button class="tbtn" id="f-air" onclick="sf('cat','AIR')">AIR</button>
  <button class="tbtn" id="f-res" onclick="sf('cat','Results')">Results</button>
  <div class="tsep"></div>
  <button class="tbtn" id="f-tea" onclick="sf('type','Teacher')">Teachers</button>
  <button class="tbtn" id="f-nt"  onclick="sf('type','Non Teacher')">Non-Teacher</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="expandAll()">Expand All</button>
  <button class="tbtn" onclick="collapseAll()">Collapse All</button>
</div>

<div class="cw" id="cw">
  <div class="canvas" id="canvas">
    <div id="root"></div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="ph">
    <div><div class="pid" id="p-id"></div><div class="pnm" id="p-nm"></div></div>
    <button class="pcl" onclick="closePanel()">Close</button>
  </div>
  <div class="pr"><div class="pl">Designation</div><div class="pv" id="p-dg"></div></div>
  <div class="pr"><div class="pl">Department</div><div class="pv" id="p-dp"></div></div>
  <div class="pr"><div class="pl">Category</div><div class="pv" id="p-ct"></div></div>
  <div class="pr"><div class="pl">Type</div><div class="pv" id="p-tp"></div></div>
  <div class="pr"><div class="pl">Location</div><div class="pv" id="p-lc"></div></div>
  <div class="pr"><div class="pl">Joined</div><div class="pv" id="p-dj"></div></div>
</div>

        var cnt=g.managers.reduce(function(s,m){return s+m.reportees.length;},0)
               +g.ghost_managers.reduce(function(s,gm){return s+gm.reportees.length;},0);
        if(cnt>0) visible=true;
      });
    });
    if(!visible) return;

    var hodRow=el('div','hod-tree');
    hodRow.style.position='relative';

    // ── L1 HOD node ──
    var hodTotal=0;
    Object.keys(hod.cats).forEach(function(cat){
      if(fCat!=='all'&&fCat!==cat) return;
      Object.keys(hod.cats[cat]).forEach(function(typ){
        if(fTyp!=='all'&&fTyp!==typ) return;
        var g=hod.cats[cat][typ];
        g.managers.forEach(function(m){hodTotal+=m.reportees.length;});
        g.ghost_managers.forEach(function(gm){hodTotal+=gm.reportees.length;});
      });
    });

    var hodCol=el('div'); hodCol.style.cssText='display:flex;flex-direction:column;justify-content:center;flex-shrink:0;margin-right:0';
    var hNode=el('div','node node-hod');
    hNode.innerHTML='<div class="lv">L1 — HOD</div><div class="nm">'+hod.name+'</div><div class="id">'+hod.id+'</div>'+
      '<div class="bgs"><span class="bg '+(hod.in_dataset?'bg-in':'bg-out')+'">'+(hod.in_dataset?'In Team':'External')+'</span></div>'+
      '<div class="tot">'+hodTotal+' members</div>';
    hodCol.appendChild(hNode);
    hodRow.appendChild(hodCol);

    // ── L2 Category subtrees ──
    var catColWrap=el('div'); catColWrap.style.cssText='display:flex;flex-direction:column;gap:20px;flex-shrink:0;';

    // Collect cats to show
    var catsToShow=[];
    ['AIR','Results'].forEach(function(cat){
      if(fCat!=='all'&&fCat!==cat) return;
      if(!hod.cats[cat]) return;
      var catTotal=0;
      Object.keys(hod.cats[cat]).forEach(function(typ){
        if(fTyp!=='all'&&fTyp!==typ) return;
        var g=hod.cats[cat][typ];
        g.managers.forEach(function(m){catTotal+=m.reportees.length;});
        g.ghost_managers.forEach(function(gm){catTotal+=gm.reportees.length;});
      });
      if(catTotal===0) return;
      catsToShow.push({cat:cat,total:catTotal});
    });

    catsToShow.forEach(function(ci){
      var cat=ci.cat, catTotal=ci.total;
      var catKey='c_'+hod.id+'_'+cat;
      var catOpen=COL[catKey]!==true;

      var catRow=el('div'); catRow.style.cssText='display:flex;flex-direction:row;align-items:flex-start;gap:0;position:relative';

      // Cat node
      var catNode=el('div','node node-cat '+cat.toLowerCase());
      catNode.style.cssText='flex-shrink:0;margin-right:0;align-self:center';
      catNode.innerHTML='<div class="lv">L2 — Category</div><div class="nm">'+cat+'</div><div class="cnt">'+catTotal+' members &nbsp;'+(catOpen?'&#9660;':'&#9654;')+'</div>';
      catNode.addEventListener('click',function(){COL[catKey]=!COL[catKey];build();});
      catRow.appendChild(catNode);

      if(catOpen){
        // ── L3 Type subtrees ──
        var typColWrap=el('div'); typColWrap.style.cssText='display:flex;flex-direction:column;gap:16px;flex-shrink:0;';

        var typesToShow=[];
        ['Teacher','Non Teacher'].forEach(function(typ){
          if(fTyp!=='all'&&fTyp!==typ) return;
          if(!hod.cats[cat][typ]) return;
          var g=hod.cats[cat][typ];
          var cnt=g.managers.reduce(function(s,m){return s+m.reportees.length;},0)
                 +g.ghost_managers.reduce(function(s,gm){return s+gm.reportees.length;},0);
          if(cnt===0) return;
          typesToShow.push({typ:typ,total:cnt,g:g});
        });

        typesToShow.forEach(function(ti){
          var typ=ti.typ, g=ti.g;
          var typKey='t_'+hod.id+'_'+cat+'_'+typ;
          var typOpen=COL[typKey]!==true;
          var tKey=typ==='Teacher'?'teacher':'nt';

          var typRow=el('div'); typRow.style.cssText='display:flex;flex-direction:row;align-items:flex-start;gap:0;position:relative';

          // Type node
          var typNode=el('div','node node-typ '+tKey);
          typNode.style.cssText='flex-shrink:0;align-self:center';
          typNode.innerHTML='<div class="lv">L3 — Type</div><div class="nm">'+(typ==='Teacher'?'Teacher':'Non-Teacher')+'</div><div class="cnt">'+ti.total+' members &nbsp;'+(typOpen?'&#9660;':'&#9654;')+'</div>';
          typNode.addEventListener('click',function(){COL[typKey]=!COL[typKey];build();});
          typRow.appendChild(typNode);

          if(typOpen){
            // ── L4 Managers + L5 Reportees ──
            var mgrColWrap=el('div'); mgrColWrap.style.cssText='display:flex;flex-direction:column;gap:12px;flex-shrink:0;';

            var allMgrs=g.managers.concat(g.ghost_managers.map(function(gm){return {__ghost:true,id:gm.id,name:gm.name,designation:'Not in dataset',cross_type:false,reportees:gm.reportees,__ghostData:gm};}));

            allMgrs.forEach(function(mgr){
              var mgrRow=el('div'); mgrRow.style.cssText='display:flex;flex-direction:row;align-items:flex-start;gap:0;position:relative';

              // Manager node
              var isGhost=!!mgr.__ghost;
              var isCross=!isGhost&&mgr.cross_type;
              var mgrNode=el('div','node '+(isGhost?'node-ghost':'node-mgr'+(isCross?' cross':'')));
              mgrNode.setAttribute('data-id',mgr.id);
              mgrNode.style.cssText='flex-shrink:0;align-self:flex-start;margin-top:0';
              if(isGhost){
                mgrNode.innerHTML='<div class="lv">Outside Dataset</div><div class="nm">'+mgr.name+'</div><div class="dg">Manager not in team</div><div class="id">'+mgr.id+'</div>';
              } else {
                mgrNode.innerHTML='<div class="lv">L4 — Manager</div><div class="nm">'+mgr.name+'</div><div class="dg">'+mgr.designation+'</div><div class="id">'+mgr.id+'</div>'+(isCross?'<div class="xtag">'+mgr.type+'</div>':'');
                (function(m){mgrNode.addEventListener('click',function(){openPanel(m);});})(mgr);
              }
              mgrRow.appendChild(mgrNode);

              // L5 Reportees
              if(mgr.reportees&&mgr.reportees.length>0){
                var repKey='r_'+mgr.id+'_'+hod.id+'_'+cat+'_'+typ;
                var repOpen=COL[repKey]!==true;

                // Toggle on manager node
                var togBtn=el('div'); togBtn.style.cssText='position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:#64748b;color:#fff;font-size:7px;font-weight:700;padding:1px 7px;border-radius:10px;cursor:pointer;z-index:2;font-family:Space Mono,monospace;border:2px solid var(--bg);white-space:nowrap';
                togBtn.textContent=(repOpen?'▼ ':'► ')+mgr.reportees.length;
                (function(rk){togBtn.addEventListener('click',function(e){e.stopPropagation();COL[rk]=!COL[rk];build();});})(repKey);
                mgrNode.appendChild(togBtn);

                if(repOpen){
                  var repGroup=el('div','rep-group');
                  repGroup.style.cssText='flex-shrink:0;align-self:flex-start;margin-left:0';
                  var rHdr=el('div','rep-group-hdr');
                  rHdr.textContent='L5 — Reportees ('+mgr.reportees.length+')';
                  repGroup.appendChild(rHdr);
                  mgr.reportees.forEach(function(rep){
                    var ri=el('div','rep-row');
                    ri.setAttribute('data-id',rep.id);
                    ri.innerHTML='<div class="rep-dot" style="background:'+dc(rep.category,rep.type)+'"></div><div class="rep-info"><div class="rep-name">'+rep.name+'</div><div class="rep-dg">'+rep.designation+'</div></div><div class="rep-id">'+rep.id+'</div>';
                    (function(r){ri.addEventListener('click',function(){openPanel(r);});})(rep);
                    repGroup.appendChild(ri);
                  });
                  mgrRow.appendChild(repGroup);
                }
              }

              mgrColWrap.appendChild(mgrRow);
            });

            typRow.appendChild(mgrColWrap);

            // SVG connectors: type -> each manager
            requestAnimationFrame(function(){
              var tRect=typNode.getBoundingClientRect();
              var rowRect=typRow.getBoundingClientRect();
              var svgEl=makeSVG(typRow.offsetWidth+200, typRow.offsetHeight+40);
              svgEl.style.top='-20px';
              typRow.style.position='relative';

              var allMgrNodes=typRow.querySelectorAll('.node-mgr,.node-ghost');
              allMgrNodes.forEach(function(mn){
                var mRect=mn.getBoundingClientRect();
                var x1=tRect.right-rowRect.left;
                var y1=(tRect.top-rowRect.top)+tRect.height/2+20;
                var x2=mRect.left-rowRect.left;
                var y2=(mRect.top-rowRect.top)+22+20;
                bezier(svgEl,x1,y1,x2,y2,'#cbd5e1');
              });
              typRow.appendChild(svgEl);
            });
          }

          typColWrap.appendChild(typRow);
        });

        catRow.appendChild(typColWrap);

        // SVG connector: cat -> each type
        requestAnimationFrame(function(){
          var cRect=catNode.getBoundingClientRect();
          var rowRect=catRow.getBoundingClientRect();
          var svgEl=makeSVG(catRow.offsetWidth+200,catRow.offsetHeight+40);
          svgEl.style.top='-20px';
          catRow.style.position='relative';
          var typNodes=catRow.querySelectorAll('.node-typ');
          typNodes.forEach(function(tn){
            var tRect=tn.getBoundingClientRect();
            var x1=cRect.right-rowRect.left;
            var y1=(cRect.top-rowRect.top)+cRect.height/2+20;
            var x2=tRect.left-rowRect.left;
            var y2=(tRect.top-rowRect.top)+tRect.height/2+20;
            bezier(svgEl,x1,y1,x2,y2,'#94a3b8');
          });
          catRow.appendChild(svgEl);
        });
      }

      catColWrap.appendChild(catRow);
    });

    hodRow.appendChild(catColWrap);

    // SVG connector: hod -> each category
    requestAnimationFrame(function(){
      var hRect=hNode.getBoundingClientRect();
      var rowRect=hodRow.getBoundingClientRect();
      var svgEl=makeSVG(hodRow.offsetWidth+200,hodRow.offsetHeight+40);
      svgEl.style.top='-20px';
      hodRow.style.position='relative';
      var catNodes=hodRow.querySelectorAll(':scope > div:nth-child(2) .node-cat');
      catNodes.forEach(function(cn){
        var cRect=cn.getBoundingClientRect();
        var x1=hRect.right-rowRect.left;
        var y1=(hRect.top-rowRect.top)+hRect.height/2+20;
        var x2=cRect.left-rowRect.left;
        var y2=(cRect.top-rowRect.top)+cRect.height/2+20;
        bezier(svgEl,x1,y1,x2,y2,'#64748b');
      });
      hodRow.appendChild(svgEl);
    });

    tree.appendChild(hodRow);
  });

  root.appendChild(tree);
}

// ─── PANEL ───────────────────────────────────────────────
function openPanel(p){
  ['p-id','p-nm','p-dg','p-dp','p-ct','p-tp','p-lc','p-dj'].forEach(function(i){document.getElementById(i).textContent='';});
  document.getElementById('p-id').textContent=p.id||'';
  document.getElementById('p-nm').textContent=p.name||'';
  document.getElementById('p-dg').textContent=p.designation||'';
  document.getElementById('p-dp').textContent=p.dept||'';
  document.getElementById('p-ct').textContent=p.category||'';
  document.getElementById('p-tp').textContent=p.type||'';
  document.getElementById('p-lc').textContent=p.loc||'';
  document.getElementById('p-dj').textContent=p.doj||'';
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('.highlighted').forEach(function(e){e.classList.remove('highlighted');});
  var el2=document.querySelector('[data-id="'+p.id+'"]');
  if(el2) el2.classList.add('highlighted');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.highlighted').forEach(function(e){e.classList.remove('highlighted');});
}

// ─── FILTERS ─────────────────────────────────────────────
function sf(axis,val){
  if(axis==='all'){fCat='all';fTyp='all';}
  if(axis==='cat'){fCat=val;fTyp='all';}
  if(axis==='type'){fTyp=val;fCat='all';}
  ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(id){document.getElementById(id).className='tbtn';});
  if(axis==='all') document.getElementById('f-all').className='tbtn on-all';
  if(axis==='cat'&&val==='AIR') document.getElementById('f-air').className='tbtn on-air';
  if(axis==='cat'&&val==='Results') document.getElementById('f-res').className='tbtn on-res';
  if(axis==='type'&&val==='Teacher') document.getElementById('f-tea').className='tbtn on-tea';
  if(axis==='type'&&val==='Non Teacher') document.getElementById('f-nt').className='tbtn on-nt';
  build();
}
function expandAll(){
  DATA.hods.forEach(function(hod){
    Object.keys(hod.cats).forEach(function(cat){
      COL['c_'+hod.id+'_'+cat]=false;
      Object.keys(hod.cats[cat]).forEach(function(typ){
        COL['t_'+hod.id+'_'+cat+'_'+typ]=false;
        var g=hod.cats[cat][typ];
        g.managers.forEach(function(m){COL['r_'+m.id+'_'+hod.id+'_'+cat+'_'+typ]=false;});
        g.ghost_managers.forEach(function(gm){COL['r_'+gm.id+'_'+hod.id+'_'+cat+'_'+typ]=false;});
      });
    });
  });
  build();
}
function collapseAll(){
  DATA.hods.forEach(function(hod){
    Object.keys(hod.cats).forEach(function(cat){
      COL['c_'+hod.id+'_'+cat]=true;
    });
  });
  build();
}

// ─── SEARCH ──────────────────────────────────────────────
var ALL=[],seen={},UNIQ=[];
DATA.hods.forEach(function(hod){
  Object.keys(hod.cats).forEach(function(cat){
    Object.keys(hod.cats[cat]).forEach(function(typ){
      var g=hod.cats[cat][typ];
      g.managers.forEach(function(m){ALL.push(m);m.reportees.forEach(function(r){ALL.push(r);});});
      g.ghost_managers.forEach(function(gm){gm.reportees.forEach(function(r){ALL.push(r);});});
    });
  });
});
ALL.forEach(function(p){if(!seen[p.id]){seen[p.id]=true;UNIQ.push(p);}});

var srch=document.getElementById('srch'), sdrop=document.getElementById('sdrop');
srch.addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  if(!q){sdrop.classList.remove('show');return;}
  var hits=UNIQ.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.id.toLowerCase().indexOf(q)>=0;}).slice(0,8);
  if(!hits.length){sdrop.classList.remove('show');return;}
  sdrop.innerHTML=hits.map(function(p){return '<div class="srow" data-id="'+p.id+'"><b>'+p.name+'</b><span>'+p.id+' · '+p.designation+' · '+p.category+'/'+p.type+'</span></div>';}).join('');
  sdrop.classList.add('show');
  sdrop.querySelectorAll('.srow').forEach(function(el2){
    el2.addEventListener('click',function(){
      srch.value='';sdrop.classList.remove('show');
      var id=this.getAttribute('data-id');
      var found=UNIQ.filter(function(p){return p.id===id;})[0];if(!found)return;
      // Expand path to this person
      DATA.hods.forEach(function(hod){
        Object.keys(hod.cats).forEach(function(cat){
          Object.keys(hod.cats[cat]).forEach(function(typ){
            var g=hod.cats[cat][typ];
            g.managers.forEach(function(m){
              if(m.reportees.filter(function(r){return r.id===id;}).length){
                COL['c_'+hod.id+'_'+cat]=false;
                COL['t_'+hod.id+'_'+cat+'_'+typ]=false;
                COL['r_'+m.id+'_'+hod.id+'_'+cat+'_'+typ]=false;
              }
            });
            g.ghost_managers.forEach(function(gm){
              if(gm.reportees.filter(function(r){return r.id===id;}).length){
                COL['c_'+hod.id+'_'+cat]=false;
                COL['t_'+hod.id+'_'+cat+'_'+typ]=false;
                COL['r_'+gm.id+'_'+hod.id+'_'+cat+'_'+typ]=false;
              }
            });
          });
        });
      });
      fCat='all';fTyp='all';
      ['f-all','f-air','f-res','f-tea','f-nt'].forEach(function(i){document.getElementById(i).className='tbtn';});
      document.getElementById('f-all').className='tbtn on-all';
      build();
      setTimeout(function(){
        var ne=document.querySelector('[data-id="'+id+'"]');
        if(ne){ne.scrollIntoView({behavior:'smooth',block:'center'});openPanel(found);}
      },120);
    });
  });
});
document.addEventListener('click',function(e){if(!e.target.closest('.sbox'))sdrop.classList.remove('show');});

// ─── PAN ─────────────────────────────────────────────────
var cw2=document.getElementById('cw');
var pan=false,mpx,mpy,msl,mst;
cw2.addEventListener('mousedown',function(e){
  if(e.target.closest('.node-cat,.node-typ,.node-mgr,.node-ghost,.rep-row,.panel,.sbox,.tbtn'))return;
  pan=true;mpx=e.pageX;mpy=e.pageY;msl=cw2.scrollLeft;mst=cw2.scrollTop;cw2.classList.add('panning');
});
document.addEventListener('mousemove',function(e){if(!pan)return;cw2.scrollLeft=msl-(e.pageX-mpx);cw2.scrollTop=mst-(e.pageY-mpy);});
document.addEventListener('mouseup',function(){pan=false;cw2.classList.remove('panning');});

// ─── STATS ───────────────────────────────────────────────
document.getElementById('c-air').textContent=UNIQ.filter(function(p){return p.category==='AIR';}).length;
document.getElementById('c-res').textContent=UNIQ.filter(function(p){return p.category==='Results';}).length;
document.getElementById('c-tea').textContent=UNIQ.filter(function(p){return p.type==='Teacher';}).length;
document.getElementById('c-nt').textContent=UNIQ.filter(function(p){return p.type==='Non Teacher';}).length;
document.getElementById('c-tot').textContent=UNIQ.length;

build();
</script>
</body>
</html>
